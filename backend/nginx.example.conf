server {
    listen 443 ssl http2;
    server_name music-share.example.com;
    client_max_body_size 80m;

    root /srv/music-share/web-player/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/music-share.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/music-share.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MusicShareSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location /internal-media/ {
        internal;
        alias /var/lib/music-share/storage/;
    }

    location = /openapi.json {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:2087;
    }

    location ~ ^/(auth|upload|client|admin|track|stream|cover|background|docs|redoc)(/|$) {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:2087;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
