name: Deploy Backend

on:
  push:
    branches:
      - cloud
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Backend to Cloudflare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      MUSIC_SHARE_USER_PASSWORD: ${{ secrets.MUSIC_SHARE_USER_PASSWORD }}
      MUSIC_SHARE_ADMIN_PASSWORD: ${{ secrets.MUSIC_SHARE_ADMIN_PASSWORD }}
      MUSIC_SHARE_PUBLIC_API_BASE_URL: ${{ vars.MUSIC_SHARE_PUBLIC_API_BASE_URL }}
      MUSIC_SHARE_PUBLIC_SHARE_BASE_URL: ${{ vars.MUSIC_SHARE_PUBLIC_SHARE_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate GitHub Actions configuration
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "::error::Missing repository secret CLOUDFLARE_API_TOKEN"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "::error::Missing repository secret CLOUDFLARE_ACCOUNT_ID"; exit 1; }
          test -n "$MUSIC_SHARE_USER_PASSWORD" || { echo "::error::Missing repository secret MUSIC_SHARE_USER_PASSWORD"; exit 1; }
          test -n "$MUSIC_SHARE_ADMIN_PASSWORD" || { echo "::error::Missing repository secret MUSIC_SHARE_ADMIN_PASSWORD"; exit 1; }
          test -n "$MUSIC_SHARE_PUBLIC_API_BASE_URL" || { echo "::error::Missing repository variable MUSIC_SHARE_PUBLIC_API_BASE_URL"; exit 1; }
          test -n "$MUSIC_SHARE_PUBLIC_SHARE_BASE_URL" || { echo "::error::Missing repository variable MUSIC_SHARE_PUBLIC_SHARE_BASE_URL"; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Apply D1 migrations and deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.11.1"
          workingDirectory: "backend"
          preCommands: |
            wrangler d1 migrations apply MUSIC_SHARE_DB --remote
          command: deploy
          secrets: |
            MUSIC_SHARE_USER_PASSWORD
            MUSIC_SHARE_ADMIN_PASSWORD
            MUSIC_SHARE_PUBLIC_API_BASE_URL
            MUSIC_SHARE_PUBLIC_SHARE_BASE_URL
