name = "music-share-backend"
main = "src/index.ts"
compatibility_date = "2026-04-05"

[observability]
enabled = true

[assets]
directory = "../web-player/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[vars]
MUSIC_SHARE_SESSION_TTL_SECONDS = "86400"
MUSIC_SHARE_SHARE_DEFAULT_TTL_SECONDS = "86400"
MUSIC_SHARE_SHARE_MAX_TTL_SECONDS = "2592000"
MUSIC_SHARE_MAX_AUDIO_UPLOAD_BYTES = "209715200"
MUSIC_SHARE_MAX_COVER_UPLOAD_BYTES = "8388608"
MUSIC_SHARE_MAX_DURATION_MS = "43200000"
MUSIC_SHARE_SESSION_COOKIE_NAME = "music_share_session"

[[d1_databases]]
binding = "MUSIC_SHARE_DB"
database_name = "music-share-backend"
database_id = "replace-with-d1-database-id"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "MUSIC_SHARE_BUCKET"
bucket_name = "music-share-backend"

[triggers]
crons = ["* * * * *"]
